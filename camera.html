<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cámara</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

#contenedor{
position:fixed;
inset:0;
overflow:hidden;
}

video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

#marco{
position:absolute;
inset:0;
background:url("assets/frame.png") center center no-repeat;
background-size:100% 100%;
pointer-events:none;
z-index:10;
}

#controles{
position:absolute;
left:0;
right:0;
bottom:30px;

display:flex;
justify-content:center;
gap:20px;

z-index:9999;
}

button{

width:75px;
height:75px;

border:none;
border-radius:50%;

font-size:28px;

background:white;

box-shadow:0 0 20px rgba(0,0,0,.5);

}

</style>

</head>

<body>

<div id="contenedor">

<video id="video" autoplay playsinline muted></video>

<div id="marco"></div>

<div id="controles">

<button id="foto">📸</button>

<button id="videoBtn">🎥</button>

<button id="cambiar">🔄</button>

</div>

</div>

<script>

const video = document.getElementById("video");
const btnFoto = document.getElementById("foto");
const btnVideo = document.getElementById("videoBtn");
const btnCambiar = document.getElementById("cambiar");

let stream = null;
let facingMode = "environment";

let mediaRecorder = null;
let chunks = [];
let grabando = false;
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx5jyIbvY5G_flOo3ezH6UtmFAWf5xdjxVU5E2zNd1flKmRHUGuM5kLMU65IAzHbQJwVQ/exec";

// =======================
// INICIAR CÁMARA
// =======================

async function startCamera(){
    

    if(stream){
        stream.getTracks().forEach(track=>track.stop());
    }

    try{

        stream = await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:facingMode
            },

            audio:true

        });

        video.srcObject = stream;

    }

    catch(error){

        alert(error.message);

    }

}

startCamera();

async function subirArchivo(blob,nombre){

    const base64 = await new Promise(resolve=>{

        const reader = new FileReader();

        reader.onloadend = ()=>{

            resolve(reader.result.split(",")[1]);

        };

        reader.readAsDataURL(blob);

    });

    const respuesta = await fetch(SCRIPT_URL,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            name:nombre,

            mime:blob.type,

            file:base64

        })

    });

    return await respuesta.json();

}
// =======================
// CAMBIAR CÁMARA
// =======================

btnCambiar.onclick = async ()=>{

    facingMode =
        facingMode==="environment"
        ? "user"
        : "environment";

    startCamera();

};


// =======================
// FOTO
// =======================

btnFoto.onclick = async ()=>{

    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    // Dibuja la cámara
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    // Dibuja el marco encima
    const marco = new Image();

    marco.src = "assets/frame.png";

    await new Promise(resolve=>{

        marco.onload = resolve;

    });

    ctx.drawImage(marco,0,0,canvas.width,canvas.height);

canvas.toBlob(async function(blob){

    if(!blob){

        alert("No se pudo crear la imagen.");

        return;

    }
    console.log(blob);

    alert("Subiendo foto...");

    try{

        const r = await subirArchivo(

            blob,

            "foto_"+Date.now()+".png"

        );

        console.log(r);

        alert("✅ Foto subida");

    }

    catch(err){

        console.error(err);

        alert(err.message);

    }

},"image/png");

};

// =======================
// VIDEO
// =======================

btnVideo.onclick = ()=>{

    if(!grabando){

        chunks=[];

        mediaRecorder=new MediaRecorder(stream);

        mediaRecorder.ondataavailable=e=>{

            chunks.push(e.data);

        };

        mediaRecorder.onstop=()=>{

            const blob=new Blob(chunks,{type:"video/webm"});

            console.log(blob);

            alert("Video grabado.");

            // aquí luego lo enviaremos a Drive

        };

        mediaRecorder.start();

        grabando=true;

        btnVideo.innerHTML="⏹";

    }

    else{

        mediaRecorder.stop();

        grabando=false;

        btnVideo.innerHTML="🎥";

    }

};

</script>

</body>

</html>
